<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SimpleCare GPS">
  <meta name="theme-color" content="#0f0f0f">
  <title>SimpleCare GPS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424;
      --border:rgba(255,255,255,0.08); --text:#f0f0f0; --text-muted:#888;
      --accent:#4ade80; --accent-bg:rgba(74,222,128,0.08); --accent-border:rgba(74,222,128,0.25);
      --radius:16px; --radius-sm:10px;
    }
    body { font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; max-width:430px; margin:0 auto; }

    .header { padding:56px 20px 20px; border-bottom:0.5px solid var(--border); }
    .brand { font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent); font-weight:500; margin-bottom:6px; }
    .header-title { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
    .header-sub { font-size:13px; color:var(--text-muted); margin-top:4px; }

    .recipient-bar { margin:16px 20px; padding:12px 16px; background:var(--surface); border-radius:var(--radius-sm); border:0.5px solid var(--border); display:flex; align-items:center; gap:10px; }
    .recipient-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); white-space:nowrap; }
    .recipient-number { font-size:15px; font-weight:600; color:var(--accent); font-variant-numeric:tabular-nums; flex:1; font-family:monospace; }

    .section-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); padding:0 20px; margin-bottom:12px; }
    .messages-list { flex:1; padding:0 20px; display:flex; flex-direction:column; gap:10px; }

    .msg-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:18px 56px 18px 18px; cursor:pointer; transition:background 0.15s,transform 0.1s; user-select:none; text-decoration:none; display:block; position:relative; }
    .msg-card:active { transform:scale(0.97); background:var(--surface2); }

    .msg-label { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; }
    .msg-cmd { font-size:13px; color:var(--text-muted); font-family:monospace; background:var(--surface2); display:inline-block; padding:2px 8px; border-radius:5px; border:0.5px solid var(--border); }
    .msg-icon { position:absolute; right:16px; top:50%; transform:translateY(-50%); width:32px; height:32px; background:var(--accent-bg); border:0.5px solid var(--accent-border); border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .msg-icon svg { width:14px; height:14px; color:var(--accent); }

    /* colores por tipo */
    .msg-card.loc .msg-icon { background:rgba(96,165,250,0.1); border-color:rgba(96,165,250,0.3); }
    .msg-card.loc .msg-icon svg { color:#60a5fa; }
    .msg-card.loc .msg-cmd { color:#60a5fa; }

    .msg-card.bat .msg-icon { background:rgba(250,204,21,0.1); border-color:rgba(250,204,21,0.3); }
    .msg-card.bat .msg-icon svg { color:#facc15; }
    .msg-card.bat .msg-cmd { color:#facc15; }

    .msg-card.find .msg-icon { background:rgba(251,146,60,0.1); border-color:rgba(251,146,60,0.3); }
    .msg-card.find .msg-icon svg { color:#fb923c; }
    .msg-card.find .msg-cmd { color:#fb923c; }

    @keyframes flashGreen { 0%{background:var(--surface)} 35%{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.35)} 100%{background:var(--surface)} }
    .msg-card.sent { animation:flashGreen 0.7s ease; }

    .footer { padding:20px; border-top:0.5px solid var(--border); margin-top:20px; }
    .footer-note { font-size:12px; color:var(--text-muted); text-align:center; line-height:1.6; }
    .footer-note span { color:var(--accent); }

    .error-box { margin:20px; padding:20px; background:rgba(248,113,113,0.08); border:0.5px solid rgba(248,113,113,0.25); border-radius:var(--radius); text-align:center; }
    .error-box p { font-size:14px; color:#f87171; line-height:1.6; }
    .error-box code { font-family:monospace; font-size:12px; background:rgba(255,255,255,0.06); padding:2px 8px; border-radius:4px; display:inline-block; margin-top:8px; color:#f0f0f0; }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">SimpleCare</div>
  <div class="header-title">Control GPS</div>
  <div class="header-sub" id="header-sub">Enviando al dispositivo...</div>
</div>

<div class="recipient-bar">
  <span class="recipient-label">Dispositivo</span>
  <span class="recipient-number" id="display-number">cargando...</span>
</div>

<div class="section-label">Selecciona un comando</div>
<div class="messages-list" id="messages-list"></div>

<div class="footer">
  <div class="footer-note">
    Toca un comando → se abre tu app de SMS con el texto listo<br>
    Solo presiona <span>Enviar</span>
  </div>
</div>

<script>
  const MESSAGES = [
    {
      label: 'Ubicación',
      cmd: 'loc',
      desc: 'Solicita la posición actual del dispositivo',
      type: 'loc',
      icon: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>'
    },
    {
      label: 'Batería',
      cmd: 'battery',
      desc: 'Consulta el nivel de batería del dispositivo',
      type: 'bat',
      icon: '<rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/><path d="M6 11h4"/>'
    },
    {
      label: 'Encontrar dispositivo',
      cmd: 'findme',
      desc: 'Activa alerta sonora o visual en el dispositivo',
      type: 'find',
      icon: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>'
    },
  ];

  const params = new URLSearchParams(window.location.search);
  const phone = params.get('to');
  const list = document.getElementById('messages-list');

  if (!phone) {
    document.getElementById('display-number').textContent = 'Sin numero';
    document.getElementById('header-sub').textContent = 'Numero no configurado';
    list.innerHTML = '<div class="error-box"><p>No se especifico el numero del dispositivo GPS.<br>La URL debe incluir el parametro <strong>?to=</strong><br><br><code>sms.simplecare.cl/?to=56912345678</code></p></div>';
  } else {
    const fmt = phone.startsWith('+') ? phone : '+' + phone;
    document.getElementById('display-number').textContent = fmt;
    document.getElementById('header-sub').textContent = 'Listo para enviar comandos';

    list.innerHTML = MESSAGES.map((m, i) => {
      const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const enc = encodeURIComponent(m.cmd);
      const href = isIos ? 'sms:'+phone+'&body='+enc : 'sms:'+phone+'?body='+enc;
      return `<a class="msg-card ${m.type}" href="${href}" id="card-${i}">
        <div class="msg-label">${m.label}</div>
        <div class="msg-cmd">${m.cmd}</div>
        <div class="msg-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${m.icon}</svg>
        </div>
      </a>`;
    }).join('');

    list.querySelectorAll('.msg-card').forEach(c => {
      c.addEventListener('click', () => {
        c.classList.remove('sent'); void c.offsetWidth; c.classList.add('sent');
      });
    });
  }

  if ('serviceWorker' in navigator) {
    const sw = "self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response(''))));";
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
  }
  const ml = document.createElement('link'); ml.rel='manifest';
  ml.href = URL.createObjectURL(new Blob([JSON.stringify({
    name:'SimpleCare GPS', short_name:'GPS Control',
    start_url:'.'+window.location.search,
    display:'standalone', background_color:'#0f0f0f', theme_color:'#0f0f0f'
  })],{type:'application/manifest+json'}));
  document.head.appendChild(ml);
</script>
</body>
</html>
