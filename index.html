<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mensajes">
  <meta name="theme-color" content="#0f0f0f">
  <title>Mensajes Rápidos</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424;
      --border:rgba(255,255,255,0.08); --text:#f0f0f0; --text-muted:#888;
      --accent:#4ade80; --accent-bg:rgba(74,222,128,0.08); --accent-border:rgba(74,222,128,0.25);
      --radius:16px; --radius-sm:10px;
    }
    body { font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; max-width:430px; margin:0 auto; }
    .header { padding:56px 20px 16px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:0.5px solid var(--border); }
    .header-title { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
    .header-sub { font-size:13px; color:var(--text-muted); margin-top:2px; }
    .recipient-bar { margin:16px 20px; padding:12px 16px; background:var(--surface); border-radius:var(--radius-sm); border:0.5px solid var(--border); display:flex; align-items:center; gap:10px; }
    .recipient-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); white-space:nowrap; }
    .recipient-number { font-size:16px; font-weight:600; color:var(--accent); font-variant-numeric:tabular-nums; flex:1; }
    .section-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); padding:0 20px; margin-bottom:10px; }
    .messages-list { flex:1; padding:0 20px; display:flex; flex-direction:column; gap:10px; }
    .msg-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; transition:background 0.15s,transform 0.1s; user-select:none; text-decoration:none; display:block; position:relative; overflow:hidden; }
    .msg-card:active { transform:scale(0.98); background:var(--surface2); }
    .msg-label { font-size:11px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); margin-bottom:6px; font-weight:500; }
    .msg-text { font-size:15px; color:var(--text); line-height:1.45; padding-right:40px; }
    .msg-icon { position:absolute; right:18px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:var(--accent); }
    @keyframes flashGreen { 0%{background:var(--surface)} 30%{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.4)} 100%{background:var(--surface)} }
    .msg-card.sent { animation:flashGreen 0.6s ease; }
    .footer { padding:20px; border-top:0.5px solid var(--border); margin-top:16px; }
    .footer-note { font-size:12px; color:var(--text-muted); text-align:center; line-height:1.5; }
    .footer-note span { color:var(--accent); }
    .error-box { margin:20px; padding:20px; background:rgba(248,113,113,0.08); border:0.5px solid rgba(248,113,113,0.25); border-radius:var(--radius); text-align:center; }
    .error-box p { font-size:14px; color:#f87171; line-height:1.6; }
    .error-box code { font-family:monospace; font-size:12px; background:rgba(255,255,255,0.06); padding:2px 6px; border-radius:4px; display:inline-block; margin-top:8px; color:#f0f0f0; }
  </style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">Mensajes rápidos</div>
    <div class="header-sub" id="msg-count">5 mensajes</div>
  </div>
</div>
<div class="recipient-bar">
  <span class="recipient-label">Para</span>
  <span class="recipient-number" id="display-number">cargando...</span>
</div>
<div class="section-label">Toca para enviar</div>
<div class="messages-list" id="messages-list"></div>
<div class="footer">
  <div class="footer-note">Toca un mensaje para abrir tu app de SMS con el texto listo.<br>Solo presiona <span>Enviar</span></div>
</div>
<script>
  const MESSAGES = [
    { label: 'Llegando',  text: 'Voy en camino, llego en 10 minutos.' },
    { label: 'Tarde',     text: 'Voy a llegar un poco tarde, me avisa si hay problema.' },
    { label: 'Llegue',    text: 'Ya llegue, estoy afuera.' },
    { label: 'Llamar',    text: 'Puedes llamarme cuando puedas?' },
    { label: 'OK',        text: 'Todo bien, sin novedades.' },
  ];
  const params = new URLSearchParams(window.location.search);
  const phone = params.get('to');
  const list = document.getElementById('messages-list');
  if (!phone) {
    document.getElementById('display-number').textContent = 'Sin numero';
    list.innerHTML = '<div class="error-box"><p>No se especifico un numero de destino.<br>La URL debe incluir el parametro <strong>?to=</strong><br><br><code>tudominio.com/sms/?to=56912345678</code></p></div>';
  } else {
    document.getElementById('display-number').textContent = phone.startsWith('+') ? phone : '+' + phone;
    document.getElementById('msg-count').textContent = MESSAGES.length + ' mensajes';
    list.innerHTML = MESSAGES.map((m,i) => {
      const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const enc = encodeURIComponent(m.text);
      const href = isIos ? 'sms:'+phone+'&body='+enc : 'sms:'+phone+'?body='+enc;
      return '<a class="msg-card" href="'+href+'" id="card-'+i+'"><div class="msg-label">'+m.label+'</div><div class="msg-text">'+m.text+'</div><svg class="msg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></a>';
    }).join('');
    list.querySelectorAll('.msg-card').forEach(c => {
      c.addEventListener('click', () => { c.classList.remove('sent'); void c.offsetWidth; c.classList.add('sent'); });
    });
  }
  if ('serviceWorker' in navigator) {
    const sw = "self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response(''))));";
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
  }
  const ml = document.createElement('link'); ml.rel='manifest';
  ml.href = URL.createObjectURL(new Blob([JSON.stringify({name:'Mensajes Rapidos',short_name:'SMS Quick',start_url:'.'+window.location.search,display:'standalone',background_color:'#0f0f0f',theme_color:'#0f0f0f'})],{type:'application/manifest+json'}));
  document.head.appendChild(ml);
</script>
</body>
</html>
