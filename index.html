<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SimpleCare">
  <meta name="theme-color" content="#f5f0eb">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <title>SimpleCare</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root {
      --bg:        #f5f0eb;
      --surface:   #ffffff;
      --surface2:  #f0ebe4;
      --border:    #ddd8d0;
      --border2:   #c8c2b8;
      --text:      #1a1714;
      --muted:     #7a7368;
      --accent:    #1d6b4f;
      --accent-lt: #eaf4ef;
      --accent-bd: #a8d4bf;
      --blue:      #1a4f8a;
      --blue-lt:   #e8f0fb;
      --blue-bd:   #a0bcde;
      --amber:     #8a5a00;
      --amber-lt:  #fdf3e3;
      --amber-bd:  #d4aa60;
      --rose:      #8a1a3a;
      --rose-lt:   #fdeef3;
      --rose-bd:   #d4a0b0;
      --purple:    #5a3a8a;
      --purple-lt: #f0eafa;
      --purple-bd: #b8a0d4;
      --radius:    20px;
      --radius-sm: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      padding: 52px 22px 22px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
    }

    .header-logo img { width: 100%; height: 100%; object-fit: contain; }

    .brand {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 3px;
    }

    .header-title {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Device bar ── */
    .recipient-bar {
      margin: 16px 20px 4px;
      padding: 14px 18px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recipient-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .recipient-number {
      font-size: 17px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      flex: 1;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
      padding: 18px 22px 10px;
    }

    /* ── Cards list ── */
    .messages-list {
      flex: 1;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 20px;
    }

    /* ── Command card base ── */
    .msg-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 80px 20px 22px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
      text-decoration: none;
      display: block;
      position: relative;
    }

    .msg-card:active { transform: scale(0.975); box-shadow: none; }

    .msg-label {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .msg-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Icon circle ── */
    .msg-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .msg-icon svg { width: 22px; height: 22px; }

    /* Color variants */
    .msg-card.loc   { border-color: var(--blue-bd); }
    .msg-card.loc   .msg-icon { background: var(--blue-lt); color: var(--blue); border: 1.5px solid var(--blue-bd); }

    .msg-card.bat   { border-color: var(--amber-bd); }
    .msg-card.bat   .msg-icon { background: var(--amber-lt); color: var(--amber); border: 1.5px solid var(--amber-bd); }

    .msg-card.find  { border-color: var(--rose-bd); }
    .msg-card.find  .msg-icon { background: var(--rose-lt); color: var(--rose); border: 1.5px solid var(--rose-bd); }

    .msg-card.msg   { border-color: var(--purple-bd); cursor: default; padding: 20px 22px 18px; }
    .msg-card.msg:active { transform: none; }
    .msg-card.alarm { border-color: var(--accent-bd); cursor: default; padding: 20px 22px 18px; }
    .msg-card.alarm:active { transform: none; }

    /* Sent flash */
    @keyframes flashCard {
      0%   { background: var(--surface); }
      40%  { background: var(--accent-lt); border-color: var(--accent-bd); }
      100% { background: var(--surface); }
    }
    .msg-card.sent { animation: flashCard 0.65s ease; }

    /* ── Msg libre ── */
    .msg-free-label {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .msg-free-label svg { width: 22px; height: 22px; color: var(--purple); flex-shrink: 0; }

    .badge-sc20 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: var(--purple);
      background: var(--purple-lt);
      border: 1px solid var(--purple-bd);
      border-radius: 6px;
      padding: 3px 10px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .msg-textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 17px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    .msg-textarea:focus { border-color: var(--purple-bd); background: #fff; }
    .msg-textarea::placeholder { color: var(--muted); }

    .msg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .msg-counter { font-size: 13px; color: var(--muted); }
    .msg-counter.warn { color: var(--amber); }
    .msg-counter.over { color: var(--rose); }

    .msg-send-btn {
      background: var(--purple);
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.15s;
    }

    .msg-send-btn svg { width: 14px; height: 14px; }
    .msg-send-btn:active { opacity: 0.8; }

    /* ── Alarm ── */
    .alarm-label {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alarm-label svg { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }

    .alarm-row-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .alarm-row { margin-bottom: 16px; }

    .alarm-time { display: flex; align-items: center; gap: 8px; }

    .alarm-time-input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      font-family: 'Lora', serif;
      width: 72px;
      text-align: center;
      outline: none;
    }

    .alarm-time-input:focus { border-color: var(--accent-bd); background: #fff; }
    .alarm-time-sep { font-size: 28px; font-weight: 700; color: var(--muted); font-family: 'Lora', serif; }

    .alarm-days { display: flex; gap: 8px; flex-wrap: wrap; }

    .alarm-day {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .alarm-day.active {
      background: var(--accent-lt);
      border-color: var(--accent-bd);
      color: var(--accent);
    }

    .alarm-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 12px 14px;
      background: var(--bg);
      border-radius: 12px;
      border: 1.5px solid var(--border);
    }

    .alarm-toggle-label { font-size: 16px; color: var(--text); font-weight: 500; }

    .alarm-toggle { position: relative; width: 48px; height: 28px; cursor: pointer; }
    .alarm-toggle input { opacity: 0; width: 0; height: 0; }

    .alarm-toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 14px;
      transition: background 0.2s;
    }

    .alarm-toggle-slider:before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .alarm-toggle input:checked + .alarm-toggle-slider { background: var(--accent); }
    .alarm-toggle input:checked + .alarm-toggle-slider:before { transform: translateX(20px); }

    .alarm-send-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }

    .alarm-send-btn:active { opacity: 0.8; }
    .alarm-send-btn svg { width: 16px; height: 16px; }

    /* ── Footer ── */
    .footer {
      padding: 20px 22px 32px;
      border-top: 1.5px solid var(--border);
      margin-top: 4px;
      background: var(--surface);
    }

    .footer-note {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .footer-note span { color: var(--accent); font-weight: 600; }

    /* ── Error ── */
    .error-box {
      margin: 4px 0;
      padding: 22px;
      background: var(--rose-lt);
      border: 1.5px solid var(--rose-bd);
      border-radius: var(--radius);
      text-align: center;
    }

    .error-box p { font-size: 16px; color: var(--rose); line-height: 1.7; }
    .error-box code {
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.06);
      padding: 3px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-top: 10px;
      color: var(--text);
    }

    /* Nombre del paciente */
    #display-nombre {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo"><img src="icon.png" alt="SimpleCare"></div>
  <div>
    <div class="brand">SimpleCare</div>
    <div class="header-title">Plataforma SC-10 y SC-20</div>
    <div class="header-sub" id="header-sub">Listo para enviar comandos</div>
  </div>
</div>

<div class="recipient-bar">
  <span class="recipient-label">Dispositivo</span>
  <div style="flex:1;min-width:0;">
    <div id="display-nombre" style="display:none;"></div>
    <span class="recipient-number" id="display-number">cargando...</span>
  </div>
</div>

<div class="section-label">Selecciona un comando</div>

<div class="messages-list" id="messages-list"></div>

<div class="footer">
  <div class="footer-note">
    Toca un comando para abrir tu app de SMS con el texto listo.<br>
    Solo presiona <span>Enviar</span>
  </div>
</div>

<script>
  const MESSAGES = [
    { label:'Ubicación',      sub:'Solicitar posición GPS',    cmd:'loc',      type:'loc',   icon:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>' },
    { label:'Encuéntrame',    sub:'Activar señal de búsqueda', cmd:'findme',   type:'find',  icon:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>' },
    { label:'Batería',        sub:'Consultar nivel de carga',  cmd:'battery',  type:'bat',   icon:'<rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/><path d="M6 11h4"/>' },
    { label:'Alarma',         sub:'',                          cmd:'',         type:'alarm', icon:'' },
    { label:'Mensaje libre',  sub:'',                          cmd:'',         type:'msg',   icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' },
  ];

  var phone = null;
  var params;
  try {
    params = new URLSearchParams(window.location.search);
    var phoneFromUrl = params.get('to');
    if (phoneFromUrl && phoneFromUrl.length > 4) {
      phone = phoneFromUrl;
      localStorage.setItem('sc_device', phone);
    } else {
      var saved = localStorage.getItem('sc_device');
      if (saved && saved.length > 4) phone = saved;
    }
  } catch(e) {}

  var list = document.getElementById('messages-list');

  if (!phone) {
    document.getElementById('display-number').textContent = 'Sin número';
    document.getElementById('header-sub').textContent = 'Número no configurado';
    list.innerHTML = '<div class="error-box"><p>Abre el link personalizado que te enviamos para configurar tu dispositivo.<br><br><code>sms.simplecare.cl/?to=TUNUMERO</code></p></div>';
  } else {
    document.getElementById('display-number').textContent = phone.startsWith('+') ? phone : '+'+phone;
    var nombre = params ? params.get('nombre') : null;
    if (!nombre) { try { nombre = localStorage.getItem('sc_nombre'); } catch(e) {} }
    if (nombre) {
      try { localStorage.setItem('sc_nombre', nombre); } catch(e) {}
      document.getElementById('display-nombre').textContent = nombre;
      document.getElementById('display-nombre').style.display = 'block';
    }

    list.innerHTML = MESSAGES.map(function(m, i) {

      if (m.type === 'alarm') {
        return '<div class="msg-card alarm" id="card-'+i+'">' +
          '<div class="alarm-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6M22 6l-3-3"/></svg>Configurar alarma</div>' +
          '<div class="alarm-row"><div class="alarm-row-label">Hora</div>' +
            '<div class="alarm-time">' +
              '<input class="alarm-time-input" type="number" id="alarm-hh-'+i+'" min="0" max="23" value="07" oninput="padAlarm(this,23)">' +
              '<span class="alarm-time-sep">:</span>' +
              '<input class="alarm-time-input" type="number" id="alarm-mm-'+i+'" min="0" max="59" value="00" oninput="padAlarm(this,59)">' +
            '</div>' +
          '</div>' +
          '<div class="alarm-row"><div class="alarm-row-label">Días de repetición</div>' +
            '<div class="alarm-days">' +
              ['L','M','X','J','V','S','D'].map(function(d,j){
                return '<button class="alarm-day'+(j<5?' active':'')+'" data-day="'+(j+1)+'" onclick="toggleDay(this,'+i+')">'+d+'</button>';
              }).join('') +
            '</div>' +
          '</div>' +
          '<div class="alarm-toggle-row">' +
            '<span class="alarm-toggle-label">Alarma activa</span>' +
            '<label class="alarm-toggle"><input type="checkbox" id="alarm-on-'+i+'" checked><span class="alarm-toggle-slider"></span></label>' +
          '</div>' +
          '<button class="alarm-send-btn" id="alarm-btn-'+i+'">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>' +
            'Enviar comando' +
          '</button>' +
        '</div>';
      }

      if (m.type === 'msg') {
        return '<div class="msg-card msg" id="card-'+i+'">' +
          '<div class="msg-free-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' + m.label + '</div>' +
          '<div class="badge-sc20">Solo SC-20 · Smartwatch</div>' +
          '<textarea class="msg-textarea" id="msg-input-'+i+'" rows="3" maxlength="94" placeholder="Escribe tu mensaje aquí..."></textarea>' +
          '<div class="msg-footer">' +
            '<span class="msg-counter" id="msg-counter-'+i+'">0 / 94</span>' +
            '<button class="msg-send-btn" id="msg-btn-'+i+'">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>' +
              'Enviar' +
            '</button>' +
          '</div>' +
        '</div>';
      }

      var isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
      var enc = encodeURIComponent(m.cmd);
      var href = isIos ? 'sms:'+phone+'&body='+enc : 'sms:'+phone+'?body='+enc;
      return '<a class="msg-card '+m.type+'" href="'+href+'" id="card-'+i+'">' +
        '<div>' +
          '<div class="msg-label">'+m.label+'</div>' +
          (m.sub ? '<div class="msg-sub">'+m.sub+'</div>' : '') +
        '</div>' +
        '<div class="msg-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+m.icon+'</svg></div>' +
      '</a>';
    }).join('');

    // Flash en cards simples
    list.querySelectorAll('.msg-card:not(.msg):not(.alarm)').forEach(function(c) {
      c.addEventListener('click', function() {
        c.classList.remove('sent');
        void c.offsetWidth;
        c.classList.add('sent');
      });
    });

    // Lógica mensaje libre
    MESSAGES.forEach(function(m, i) {
      if (m.type === 'msg') {
        var ta  = document.getElementById('msg-input-'+i);
        var ct  = document.getElementById('msg-counter-'+i);
        var btn = document.getElementById('msg-btn-'+i);
        if (ta && ct) {
          ta.addEventListener('input', function() {
            var len = ta.value.length;
            ct.textContent = len + ' / 94';
            ct.className = 'msg-counter' + (len >= 94 ? ' over' : len >= 80 ? ' warn' : '');
          });
        }
        if (btn) {
          btn.addEventListener('click', function() {
            var txt = ta ? ta.value.trim() : '';
            if (!txt) { if (ta) ta.focus(); return; }
            var cmd = 'display1,' + txt;
            var isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
            var href = isIos ? 'sms:'+phone+'&body='+encodeURIComponent(cmd) : 'sms:'+phone+'?body='+encodeURIComponent(cmd);
            window.location.href = href;
          });
        }
      }
      // Lógica alarma
      if (m.type === 'alarm') {
        setTimeout(function() {
          var btn = document.getElementById('alarm-btn-'+i);
          if (btn) {
            btn.addEventListener('click', function() {
              var cmd = getAlarmCmd(i);
              if (!cmd) return;
              var isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
              var href = isIos ? 'sms:'+phone+'&body='+encodeURIComponent(cmd) : 'sms:'+phone+'?body='+encodeURIComponent(cmd);
              window.location.href = href;
            });
          }
        }, 100);
      }
    });
  }

  function padAlarm(el, max) {
    var v = parseInt(el.value);
    if (isNaN(v)) v = 0;
    if (v > max) v = max;
    if (v < 0)   v = 0;
    el.value = v;
  }

  function toggleDay(btn, idx) {
    btn.classList.toggle('active');
  }

  function getAlarmCmd(i) {
    var hh  = document.getElementById('alarm-hh-'+i);
    var mm  = document.getElementById('alarm-mm-'+i);
    var on  = document.getElementById('alarm-on-'+i);
    var days = document.querySelectorAll('#card-'+i+' .alarm-day.active');
    if (!hh || !mm || !on) return '';
    var hhv    = String(parseInt(hh.value)||0).padStart(2,'0');
    var mmv    = String(parseInt(mm.value)||0).padStart(2,'0');
    var dayStr = Array.from(days).map(function(d){ return d.getAttribute('data-day'); }).sort().join('');
    if (!dayStr) dayStr = '0';
    var estado = on.checked ? '1' : '0';
    return 'alarm1,'+hhv+mmv+','+dayStr+','+estado;
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }
</script>
</body>
</html>
