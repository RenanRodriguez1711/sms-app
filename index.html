  <title>SimpleCare</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424;
      --border:rgba(255,255,255,0.08); --text:#f0f0f0; --text-muted:#888;
      --accent:#4ade80; --accent-bg:rgba(74,222,128,0.08); --accent-border:rgba(74,222,128,0.25);
      --radius:16px; --radius-sm:10px;
    }
    body { font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; max-width:430px; margin:0 auto; }
    .header { padding:56px 20px 20px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:14px; }
    .header-logo { width:48px; height:48px; border-radius:10px; overflow:hidden; flex-shrink:0; background:#fff; }
    .header-logo img { width:100%; height:100%; object-fit:contain; }
    .brand { font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent); font-weight:500; margin-bottom:4px; }
    .header-title { font-size:22px; font-weight:700; letter-spacing:-0.3px; }
    .header-sub { font-size:13px; color:var(--text-muted); margin-top:3px; }
    .recipient-bar { margin:16px 20px; padding:12px 16px; background:var(--surface); border-radius:var(--radius-sm); border:0.5px solid var(--border); display:flex; align-items:center; gap:10px; }
    .recipient-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); white-space:nowrap; }
    .recipient-number { font-size:15px; font-weight:600; color:var(--accent); font-variant-numeric:tabular-nums; flex:1; font-family:monospace; }
    .section-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); padding:0 20px; margin-bottom:12px; }
    .messages-list { flex:1; padding:0 20px; display:flex; flex-direction:column; gap:12px; }
    .msg-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:22px 76px 22px 22px; cursor:pointer; transition:background 0.15s,transform 0.1s; user-select:none; text-decoration:none; display:block; position:relative; }
    .msg-card:active { transform:scale(0.97); background:var(--surface2); }
    .msg-label { font-size:22px; font-weight:600; color:var(--text); }
    .msg-icon { position:absolute; right:18px; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .msg-icon svg { width:24px; height:24px; }
    .msg-card.loc .msg-icon { background:rgba(96,165,250,0.1); border:0.5px solid rgba(96,165,250,0.3); }
    .msg-card.loc .msg-icon svg { color:#60a5fa; }
    .msg-card.bat .msg-icon { background:rgba(250,204,21,0.1); border:0.5px solid rgba(250,204,21,0.3); }
    .msg-card.bat .msg-icon svg { color:#facc15; }
    .msg-card.find .msg-icon { background:rgba(251,146,60,0.1); border:0.5px solid rgba(251,146,60,0.3); }
    .msg-card.find .msg-icon svg { color:#fb923c; }
    .msg-card.msg .msg-icon { background:rgba(167,139,250,0.1); border:0.5px solid rgba(167,139,250,0.3); }
    .msg-card.msg .msg-icon svg { color:#a78bfa; }
    @keyframes flashGreen { 0%{background:var(--surface)} 35%{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.35)} 100%{background:var(--surface)} }
    .msg-card.sent { animation:flashGreen 0.7s ease; }
    .footer { padding:20px; border-top:0.5px solid var(--border); margin-top:20px; }
    .footer-note { font-size:13px; color:var(--text-muted); text-align:center; line-height:1.6; }
    .footer-note span { color:var(--accent); }
    .error-box { margin:20px; padding:20px; background:rgba(248,113,113,0.08); border:0.5px solid rgba(248,113,113,0.25); border-radius:var(--radius); text-align:center; }
    .error-box p { font-size:14px; color:#f87171; line-height:1.6; }
    .error-box code { font-family:monospace; font-size:12px; background:rgba(255,255,255,0.06); padding:2px 8px; border-radius:4px; display:inline-block; margin-top:8px; color:#f0f0f0; }

    .msg-card.msg { padding:18px 18px 14px 18px; cursor:default; }
    .msg-card.msg:active { transform:none; background:var(--surface); }
    .msg-free-label { font-size:22px; font-weight:600; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
    .msg-free-label svg { width:24px; height:24px; color:#a78bfa; flex-shrink:0; }
    .msg-textarea { width:100%; background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:15px; color:var(--text); font-family:inherit; resize:none; outline:none; line-height:1.5; }
    .msg-textarea:focus { border-color:rgba(167,139,250,0.4); }
    .msg-footer { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
    .msg-counter { font-size:12px; color:var(--text-muted); }
    .msg-counter.warn { color:#fb923c; }
    .msg-counter.over { color:#f87171; }
    .msg-send-btn { background:rgba(167,139,250,0.15); border:0.5px solid rgba(167,139,250,0.4); color:#a78bfa; font-size:14px; font-weight:600; border-radius:8px; padding:8px 18px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
    .msg-send-btn:active { transform:scale(0.97); }
    .msg-send-btn svg { width:14px; height:14px; }

    .msg-card.alarm { padding:18px 18px 14px 18px; cursor:default; }
    .msg-card.alarm:active { transform:none; background:var(--surface); }
    .alarm-label { font-size:22px; font-weight:600; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .alarm-label svg { width:24px; height:24px; color:#f472b6; flex-shrink:0; }
    .alarm-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
    .alarm-row-label { font-size:11px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); width:100%; margin-bottom:4px; }
    .alarm-select { background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:15px; color:var(--text); font-family:inherit; outline:none; }
    .alarm-select:focus { border-color:rgba(244,114,182,0.4); }
    .alarm-time { display:flex; align-items:center; gap:6px; }
    .alarm-time-input { background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; padding:8px 10px; font-size:18px; font-weight:600; color:var(--text); font-family:monospace; width:58px; text-align:center; outline:none; }
    .alarm-time-input:focus { border-color:rgba(244,114,182,0.4); }
    .alarm-time-sep { font-size:20px; font-weight:700; color:var(--text-muted); }
    .alarm-days { display:flex; gap:6px; flex-wrap:wrap; }
    .alarm-day { width:36px; height:36px; border-radius:50%; background:var(--surface2); border:0.5px solid var(--border); color:var(--text-muted); font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; transition:background 0.15s; }
    .alarm-day.active { background:rgba(244,114,182,0.15); border-color:rgba(244,114,182,0.4); color:#f472b6; }
    .alarm-toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .alarm-toggle-label { font-size:14px; color:var(--text-muted); }
    .alarm-toggle { position:relative; width:44px; height:24px; cursor:pointer; }
    .alarm-toggle input { opacity:0; width:0; height:0; }
    .alarm-toggle-slider { position:absolute; inset:0; background:var(--surface2); border:0.5px solid var(--border); border-radius:12px; transition:background 0.2s; }
    .alarm-toggle-slider:before { content:''; position:absolute; width:18px; height:18px; left:3px; top:3px; background:var(--text-muted); border-radius:50%; transition:transform 0.2s, background 0.2s; }
    .alarm-toggle input:checked + .alarm-toggle-slider { background:rgba(244,114,182,0.2); border-color:rgba(244,114,182,0.4); }
    .alarm-toggle input:checked + .alarm-toggle-slider:before { transform:translateX(20px); background:#f472b6; }
    .alarm-send-btn { width:100%; background:rgba(244,114,182,0.15); border:0.5px solid rgba(244,114,182,0.4); color:#f472b6; font-size:15px; font-weight:600; border-radius:8px; padding:11px; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:4px; }
    .alarm-send-btn:active { transform:scale(0.98); }
    .alarm-send-btn svg { width:15px; height:15px; }
    .alarm-preview { font-size:11px; color:var(--text-muted); font-family:monospace; margin-top:8px; text-align:center; background:var(--surface2); border-radius:6px; padding:5px 10px; word-break:break-all; }
  </style>
</head>

<script>
  const MESSAGES = [
    { label:'Ubicación', cmd:'loc', type:'loc', icon:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>' },
    { label:'Encuéntrame', cmd:'findme', type:'find', icon:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>' },
    { label:'Alarma', cmd:'', type:'alarm', icon:'' },
    { label:'Mensaje libre', cmd:'display1,Escribe tu mensaje aquí', type:'msg', icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' },
    { label:'Batería', cmd:'battery', type:'bat', icon:'<rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/><path d="M6 11h4"/>' },
  ];

  var phone = null;
  try {
    var params = new URLSearchParams(window.location.search);
    var phoneFromUrl = params.get('to');
    if (phoneFromUrl && phoneFromUrl.length > 4) {
      phone = phoneFromUrl;
      localStorage.setItem('sc_device', phone);
    } else {
      var saved = localStorage.getItem('sc_device');
      if (saved && saved.length > 4) phone = saved;
    }
  } catch(e) {
    try {
      var params2 = new URLSearchParams(window.location.search);
      phone = params2.get('to');
    } catch(e2) {}
  }

  var list = document.getElementById('messages-list');

  if (!phone) {
    document.getElementById('display-number').textContent = 'Sin número';
    document.getElementById('header-sub').textContent = 'Número no configurado';
    list.innerHTML = '<div class="error-box"><p>Abre el link personalizado que te enviamos para configurar tu dispositivo.<br><br><code>sms.simplecare.cl/?to=TUNUMERO</code></p></div>';
  } else {
    document.getElementById('display-number').textContent = phone.startsWith('+') ? phone : '+'+phone;
    list.innerHTML = MESSAGES.map(function(m,i) {
      if (m.type === 'alarm') {
        return '<div class="msg-card alarm" id="card-'+i+'">' +
          '<div class="alarm-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6M22 6l-3-3"/></svg>Configurar alarma</div>' +
          '<input type="hidden" id="alarm-n-'+i+'" value="1">' +
          '<div class="alarm-row"><div class="alarm-row-label">Hora</div>' +
            '<div class="alarm-time">' +
              '<input class="alarm-time-input" type="number" id="alarm-hh-'+i+'" min="0" max="23" value="07" placeholder="07" oninput="padAlarm(this,23);updateAlarmPreview('+i+')">' +
              '<span class="alarm-time-sep">:</span>' +
              '<input class="alarm-time-input" type="number" id="alarm-mm-'+i+'" min="0" max="59" value="00" placeholder="00" oninput="padAlarm(this,59);updateAlarmPreview('+i+')">' +
            '</div>' +
          '</div>' +
          '<div class="alarm-row"><div class="alarm-row-label">Días de repetición</div>' +
            '<div class="alarm-days">' +
              '<button class="alarm-day active" data-day="1" onclick="toggleDay(this,'+i+')">L</button>' +
              '<button class="alarm-day active" data-day="2" onclick="toggleDay(this,'+i+')">M</button>' +
              '<button class="alarm-day active" data-day="3" onclick="toggleDay(this,'+i+')">X</button>' +
              '<button class="alarm-day active" data-day="4" onclick="toggleDay(this,'+i+')">J</button>' +
              '<button class="alarm-day active" data-day="5" onclick="toggleDay(this,'+i+')">V</button>' +
              '<button class="alarm-day" data-day="6" onclick="toggleDay(this,'+i+')">S</button>' +
              '<button class="alarm-day" data-day="7" onclick="toggleDay(this,'+i+')">D</button>' +
            '</div>' +
          '</div>' +
          '<div class="alarm-toggle-row">' +
            '<span class="alarm-toggle-label">Alarma activa</span>' +
            '<label class="alarm-toggle"><input type="checkbox" id="alarm-on-'+i+'" checked onchange="updateAlarmPreview('+i+')"><span class="alarm-toggle-slider"></span></label>' +
          '</div>' +
          '<div class="alarm-preview" id="alarm-preview-'+i+'">alarm1,0700,12345,1</div>' +
          '<button class="alarm-send-btn" id="alarm-btn-'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>Enviar comando</button>' +
        '</div>';
      }
      if (m.type === 'msg') {
        return '<div class="msg-card msg" id="card-'+i+'">' +
          '<div class="msg-free-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Mensaje libre</div>' +
          '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.7px;color:#a78bfa;margin-bottom:10px;background:rgba(167,139,250,0.08);border:0.5px solid rgba(167,139,250,0.2);border-radius:6px;padding:4px 10px;display:inline-block;">Solo SC-20 / Smartwatch</div>' +
          '<textarea class="msg-textarea" id="msg-input-'+i+'" rows="3" maxlength="94" placeholder="Escribe tu mensaje aquí..."></textarea>' +
          '<div class="msg-footer">' +
            '<span class="msg-counter" id="msg-counter-'+i+'">0 / 94</span>' +
            '<button class="msg-send-btn" id="msg-btn-'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>Enviar</button>' +
          '</div>' +
        '</div>';
      }
      var isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
      var enc = encodeURIComponent(m.cmd);
      var href = isIos ? 'sms:'+phone+'&body='+enc : 'sms:'+phone+'?body='+enc;
      return '<a class="msg-card '+m.type+'" href="'+href+'" id="card-'+i+'"><div class="msg-label">'+m.label+'</div><div class="msg-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+m.icon+'</svg></div></a>';
    }).join('');
    list.querySelectorAll('.msg-card:not(.msg)').forEach(function(c) {
      c.addEventListener('click', function() { c.classList.remove('sent'); void c.offsetWidth; c.classList.add('sent'); });
    });
    MESSAGES.forEach(function(m,i) {
      if (m.type === 'alarm') {
        return '<div class="msg-card alarm" id="card-'+i+'">' +
          '<div class="alarm-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6M22 6l-3-3"/></svg>Configurar alarma</div>' +
          '<input type="hidden" id="alarm-n-'+i+'" value="1">' +
          '<div class="alarm-row"><div class="alarm-row-label">Hora</div>' +
            '<div class="alarm-time">' +
              '<input class="alarm-time-input" type="number" id="alarm-hh-'+i+'" min="0" max="23" value="07" placeholder="07" oninput="padAlarm(this,23);updateAlarmPreview('+i+')">' +
              '<span class="alarm-time-sep">:</span>' +
              '<input class="alarm-time-input" type="number" id="alarm-mm-'+i+'" min="0" max="59" value="00" placeholder="00" oninput="padAlarm(this,59);updateAlarmPreview('+i+')">' +
            '</div>' +
          '</div>' +
          '<div class="alarm-row"><div class="alarm-row-label">Días de repetición</div>' +
            '<div class="alarm-days">' +
              '<button class="alarm-day active" data-day="1" onclick="toggleDay(this,'+i+')">L</button>' +
              '<button class="alarm-day active" data-day="2" onclick="toggleDay(this,'+i+')">M</button>' +
              '<button class="alarm-day active" data-day="3" onclick="toggleDay(this,'+i+')">X</button>' +
              '<button class="alarm-day active" data-day="4" onclick="toggleDay(this,'+i+')">J</button>' +
              '<button class="alarm-day active" data-day="5" onclick="toggleDay(this,'+i+')">V</button>' +
              '<button class="alarm-day" data-day="6" onclick="toggleDay(this,'+i+')">S</button>' +
              '<button class="alarm-day" data-day="7" onclick="toggleDay(this,'+i+')">D</button>' +
            '</div>' +
          '</div>' +
          '<div class="alarm-toggle-row">' +
            '<span class="alarm-toggle-label">Alarma activa</span>' +
            '<label class="alarm-toggle"><input type="checkbox" id="alarm-on-'+i+'" checked onchange="updateAlarmPreview('+i+')"><span class="alarm-toggle-slider"></span></label>' +
          '</div>' +
          '<div class="alarm-preview" id="alarm-preview-'+i+'">alarm1,0700,12345,1</div>' +
          '<button class="alarm-send-btn" id="alarm-btn-'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>Enviar comando</button>' +
        '</div>';
      }
      if (m.type === 'msg') {
        var ta = document.getElementById('msg-input-'+i);
        var ct = document.getElementById('msg-counter-'+i);
        var btn = document.getElementById('msg-btn-'+i);
        if (ta && ct) {
          ta.addEventListener('input', function() {
            var len = ta.value.length;
            ct.textContent = len + ' / 94';
            ct.className = 'msg-counter' + (len >= 94 ? ' over' : len >= 80 ? ' warn' : '');
          });
        }
        if (btn) {
          btn.addEventListener('click', function() {
            var txt = ta ? ta.value.trim() : '';
            if (!txt) { if(ta) ta.focus(); return; }
            var cmd = 'display1,' + txt;
            var isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
            var enc = encodeURIComponent(cmd);
            var href = isIos ? 'sms:'+phone+'&body='+enc : 'sms:'+phone+'?body='+enc;
            window.location.href = href;
          });
        }
      }
    });
  }

  function padAlarm(el, max) {
    var v = parseInt(el.value);
    if (isNaN(v)) v = 0;
    if (v > max) v = max;
    if (v < 0) v = 0;
    el.value = v;
  }

  function toggleDay(btn, idx) {
    btn.classList.toggle('active');
    updateAlarmPreview(idx);
  }

  function getAlarmCmd(i) {
    var n = document.getElementById('alarm-n-'+i);
    var hh = document.getElementById('alarm-hh-'+i);
    var mm = document.getElementById('alarm-mm-'+i);
    var on = document.getElementById('alarm-on-'+i);
    var days = document.querySelectorAll('#card-'+i+' .alarm-day.active');
    if (!n || !hh || !mm || !on) return '';
    var hhv = String(parseInt(hh.value)||0).padStart(2,'0');
    var mmv = String(parseInt(mm.value)||0).padStart(2,'0');
    var dayStr = Array.from(days).map(function(d){return d.getAttribute('data-day');}).sort().join('');
    if (!dayStr) dayStr = '0';
    var estado = on.checked ? '1' : '0';
    return 'alarm'+n.value+','+hhv+mmv+','+dayStr+','+estado;
  }

  function updateAlarmPreview(i) {
    var prev = document.getElementById('alarm-preview-'+i);
    if (prev) prev.textContent = getAlarmCmd(i);
  }

  // Inicializar previews al cargar
  setTimeout(function() {
    MESSAGES.forEach(function(m,i) {
      if (m.type === 'alarm') updateAlarmPreview(i);
      if (m.type === 'alarm') {
        var btn = document.getElementById('alarm-btn-'+i);
        if (btn) {
          btn.addEventListener('click', function() {
            var cmd = getAlarmCmd(i);
            if (!cmd) return;
            var isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
            var enc = encodeURIComponent(cmd);
            var href = isIos ? 'sms:'+phone+'&body='+enc : 'sms:'+phone+'?body='+enc;
            window.location.href = href;
          });
        }
      }
    });
  }, 100);
</script>
</body>
</html>
